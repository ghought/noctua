<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <rect width="1024" height="1024" fill="#000000"/>

  <!-- Outer constellation ring (subtle) -->
  <circle cx="512" cy="512" r="340" fill="none" stroke="#c9a866" stroke-width="1.5" stroke-dasharray="6 14" opacity="0.25"/>

  <!-- Wing lines — left -->
  <line x1="512" y1="440" x2="260" y2="560" stroke="#c9a866" stroke-width="3" opacity="0.5"/>
  <line x1="260" y1="560" x2="310" y2="680" stroke="#c9a866" stroke-width="2.5" opacity="0.35"/>
  <!-- Wing lines — right -->
  <line x1="512" y1="440" x2="764" y2="560" stroke="#c9a866" stroke-width="3" opacity="0.5"/>
  <line x1="764" y1="560" x2="714" y2="680" stroke="#c9a866" stroke-width="2.5" opacity="0.35"/>

  <!-- Body line -->
  <line x1="512" y1="440" x2="512" y2="700" stroke="#c9a866" stroke-width="2.5" opacity="0.4"/>

  <!-- Ear tufts -->
  <line x1="430" y1="310" x2="400" y2="210" stroke="#c9a866" stroke-width="3" opacity="0.6"/>
  <line x1="594" y1="310" x2="624" y2="210" stroke="#c9a866" stroke-width="3" opacity="0.6"/>

  <!-- Head outline arc (implied by dots) -->
  <path d="M 380 430 Q 512 270 644 430" fill="none" stroke="#c9a866" stroke-width="2.5" opacity="0.5"/>

  <!-- Left eye — outer glow -->
  <circle cx="430" cy="460" r="66" fill="#c9a866" opacity="0.08"/>
  <!-- Left eye — ring -->
  <circle cx="430" cy="460" r="52" fill="none" stroke="#c9a866" stroke-width="3.5" opacity="0.7"/>
  <!-- Left eye — iris -->
  <circle cx="430" cy="460" r="30" fill="#c9a866" opacity="0.15"/>
  <!-- Left eye — pupil -->
  <circle cx="430" cy="460" r="14" fill="#c9a866" opacity="0.9"/>
  <!-- Left eye — highlight -->
  <circle cx="440" cy="452" r="5" fill="#ffffff" opacity="0.6"/>

  <!-- Right eye — outer glow -->
  <circle cx="594" cy="460" r="66" fill="#c9a866" opacity="0.08"/>
  <!-- Right eye — ring -->
  <circle cx="594" cy="460" r="52" fill="none" stroke="#c9a866" stroke-width="3.5" opacity="0.7"/>
  <!-- Right eye — iris -->
  <circle cx="594" cy="460" r="30" fill="#c9a866" opacity="0.15"/>
  <!-- Right eye — pupil -->
  <circle cx="594" cy="460" r="14" fill="#c9a866" opacity="0.9"/>
  <!-- Right eye — highlight -->
  <circle cx="604" cy="452" r="5" fill="#ffffff" opacity="0.6"/>

  <!-- Beak (small diamond) -->
  <polygon points="512,520 490,548 512,568 534,548" fill="#c9a866" opacity="0.85"/>

  <!-- Constellation dots: ear tips -->
  <circle cx="400" cy="210" r="8" fill="#c9a866" opacity="0.9"/>
  <circle cx="624" cy="210" r="8" fill="#c9a866" opacity="0.9"/>

  <!-- Constellation dots: wing tips -->
  <circle cx="260" cy="560" r="7" fill="#c9a866" opacity="0.75"/>
  <circle cx="764" cy="560" r="7" fill="#c9a866" opacity="0.75"/>
  <circle cx="310" cy="680" r="6" fill="#c9a866" opacity="0.6"/>
  <circle cx="714" cy="680" r="6" fill="#c9a866" opacity="0.6"/>

  <!-- Central chest star (diamond) -->
  <polygon points="512,630 524,650 512,670 500,650" fill="#c9a866" opacity="0.8"/>

  <!-- Scattered background stars -->
  <circle cx="180" cy="180" r="3" fill="#c9a866" opacity="0.4"/>
  <circle cx="844" cy="200" r="2.5" fill="#c9a866" opacity="0.35"/>
  <circle cx="150" cy="700" r="2" fill="#c9a866" opacity="0.3"/>
  <circle cx="870" cy="750" r="3" fill="#c9a866" opacity="0.35"/>
  <circle cx="512" cy="120" r="2.5" fill="#c9a866" opacity="0.4"/>
  <circle cx="200" cy="430" r="2" fill="#c9a866" opacity="0.25"/>
  <circle cx="820" cy="400" r="2" fill="#c9a866" opacity="0.25"/>
  <circle cx="350" cy="820" r="2.5" fill="#c9a866" opacity="0.3"/>
  <circle cx="670" cy="830" r="2" fill="#c9a866" opacity="0.3"/>
</svg>